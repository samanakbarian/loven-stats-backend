version: 2

models:
  - name: serving_silly_season_feed
    description: "API-optimerat silly-feed."
    columns:
      - name: content_id
        tests: [not_null]
      - name: url
        tests: [not_null]

  - name: serving_roster_overview
    description: "Senaste rosterstatus per spelare och säsong."
    columns:
      - name: player_id
        tests: [not_null]
      - name: latest_status
        tests: [not_null]

  - name: serving_match_summary
    description: "Komprimerad standings/matchkontext för API."
    columns:
      - name: season_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]

  - name: serving_team_economy_dashboard
    description: "Senaste finansiella snapshot per team/säsong."
    columns:
      - name: team_id
        tests: [not_null]
      - name: season_id
        tests: [not_null]
