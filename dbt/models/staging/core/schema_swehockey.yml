version: 2

sources:
  - name: raw_sports
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', target.project) }}"
    schema: raw_sports
    loaded_at_field: scraped_at
    freshness:
      warn_after: {count: 3, period: hour}
      error_after: {count: 12, period: hour}
    tables:
      - name: swehockey_player_stats
        columns:
          - name: player_name
            tests: [not_null]
          - name: season_group_id
            tests: [not_null]
          - name: team_id
            tests: [not_null]
      - name: swehockey_goalie_stats
        columns:
          - name: goalie_name
            tests: [not_null]
          - name: season_group_id
            tests: [not_null]
          - name: team_id
            tests: [not_null]
      - name: swehockey_standings
        columns:
          - name: season_group_id
            tests: [not_null]
          - name: team_name
            tests: [not_null]
          - name: rank
            tests: [not_null]

